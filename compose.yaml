services:
  postgres:
    image: postgres:16-alpine
    container_name: anduck-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: anduck
      POSTGRES_PASSWORD: anduck
      POSTGRES_DB: anduck
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./anduck_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anduck -d anduck"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
